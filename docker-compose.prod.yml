services:
    # =============================================
    # SERVICIO 1: Base de Datos MongoDB
    # =============================================
    mongo-db:
        image: mongo:latest
        container_name: mongo-db
        restart: always
        # NO exponemos el puerto 27017 al exterior.
        # Solo el backend puede acceder a MongoDB
        # a traves de la red interna de Docker.
        volumes:
            - datos-mongo:/data/db # Persistencia de datos
        environment:
            MONGO_INITDB_ROOT_USERNAME: admin
            MONGO_INITDB_ROOT_PASSWORD: secreto
        healthcheck:
            test: [ "CMD", "mongosh", "--eval", "db.adminCommand('ping')" ]
            interval: 10s
            timeout: 5s
            retries: 5
            start_period: 20s
        networks:
            - mi-red-proyecto

    # =============================================
    # SERVICIO 2: Backend Express.js
    # =============================================
    backend:
        build: ./backend
        container_name: backend
        restart: always
        ports:
            - "3000:3000" # Este SI se expone al mundo
        depends_on:
            mongo-db:
                condition: service_healthy
        environment:
            NODE_ENV: production
            PORT: 3000
            MONGODB_URI: mongodb://admin:secreto@mongo-db:27017/mi_db?authSource=admin
            JWT_SECRET: e3b0c44298fc1c149afbf4c8996fb92428291641e7344a7868fe3b0c44298fc1c149afbf4c8996fb924
            JWT_EXPIRES_IN: 3h
            CORS_ORIGIN: http://un-toque-frontend.s3-website-us-east-1.amazonaws.com
        networks:
            - mi-red-proyecto

# =============================================
# RED INTERNA: Los contenedores se comunican
# entre si sin exponer puertos al mundo.
# =============================================
networks:
    mi-red-proyecto:
        driver: bridge

# =============================================
# VOLUMEN: Guarda los datos de MongoDB en disco
# para que no se pierdan al reiniciar.
# =============================================
volumes:
    datos-mongo:
